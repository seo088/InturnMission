# ─────────────────────────────────────────────────────────────
# knowledgemap.kr ontology serving — static + content negotiation
#
# Published vocabularies (2 parallel namespaces):
#   1. KOAH — Korea Open Animal Hub (반려동물 지식그래프)
#        https://knowledgemap.kr/koah/def/           → ontology HTML / Turtle
#   2. MCPMap + AgentMap v0.5 (OpenHarness 반영, 군산대 AMI Lab.)
#        https://vocab.knowledgemap.kr/def/mcpmap/   → MCP Server 어휘
#        https://vocab.knowledgemap.kr/def/agentmap/ → Agent/Harness/Skill 어휘
#      dev 편의 단일 host 서빙 경로: /vocab/def/mcpmap/ , /vocab/def/agentmap/
#
# Content negotiation (KOAH 만 turtle 발행됨):
#   Accept: text/html        → docs/respec/ontology.html
#   Accept: text/turtle      → turtle/def_animal.ttl
#   Accept: application/rdf+xml → turtle/def_animal.ttl
#
# Local dev: server_name _ (catch-all)
# Prod: 2 개 vhost (knowledgemap.kr / vocab.knowledgemap.kr) + TLS sidecar
# ─────────────────────────────────────────────────────────────

map $http_accept $ontology_target {
    default                        /_respec/ontology.html;
    "~*text/turtle"                /_turtle/def_animal.ttl;
    "~*application/x-turtle"       /_turtle/def_animal.ttl;
    "~*application/rdf\+xml"       /_turtle/def_animal.ttl;
    "~*application/n-triples"      /_turtle/def_animal.ttl;
}

server {
    listen       80;
    listen       [::]:80;   # alpine /etc/hosts ::1 localhost → busybox wget/healthcheck 호환
    server_name  _;   # TODO: def.knowledgemap.kr (DNS 확보 시)

    charset utf-8;
    access_log /var/log/nginx/respec.access.log;
    error_log  /var/log/nginx/respec.error.log warn;

    # ── KOAH ontology namespace root ──
    location = /koah/def/ {
        rewrite ^ $ontology_target last;
    }

    # ── Term URIs: /koah/def/{Term}  (e.g. AnimalHospital, hasSymptom) ──
    location ~ ^/koah/def/[A-Za-z][A-Za-z0-9_-]*$ {
        rewrite ^ $ontology_target last;
    }

    # ── Legacy redirect (이전 /def/animal/* → /koah/def/*) ──
    location ~ ^/def/animal/(.*)$ {
        return 301 /koah/def/$1;
    }

    # ── MCPMap / AgentMap v0.5 (vocab.knowledgemap.kr 네임스페이스 dev 미러) ──
    # 단일 HTML 문서 (mcpm: + am: 통합 명세). Turtle 발행 전까지는 HTML 만.
    location = /vocab/def/mcpmap/ {
        rewrite ^ /_mcpmap/mcpmap_vocab_spec_v05.html last;
    }
    location = /vocab/def/agentmap/ {
        rewrite ^ /_mcpmap/mcpmap_vocab_spec_v05.html last;
    }
    location ~ ^/vocab/def/mcpmap/[A-Za-z][A-Za-z0-9_-]*$ {
        rewrite ^ /_mcpmap/mcpmap_vocab_spec_v05.html last;
    }
    location ~ ^/vocab/def/agentmap/[A-Za-z][A-Za-z0-9_-]*$ {
        rewrite ^ /_mcpmap/mcpmap_vocab_spec_v05.html last;
    }

    # dev 편의 단축 경로 + 다이어그램
    location = /mcpmap/ {
        return 302 /vocab/def/mcpmap/;
    }
    location = /mcpmap/diagram {
        rewrite ^ /_mcpmap/mcpmap_vocab_v05.svg last;
    }

    location /_mcpmap/ {
        internal;
        alias /usr/share/nginx/html/mcpmap/;
        types {
            text/html   html;
            image/svg+xml svg;
        }
    }
    location /mcpmap-files/ {
        alias /usr/share/nginx/html/mcpmap/;
        autoindex on;
    }

    # ── Internal aliases (not directly browsed) ──
    location /_respec/ {
        internal;
        alias /usr/share/nginx/html/respec/;
    }
    location /_turtle/ {
        internal;
        alias /usr/share/nginx/html/turtle/;
        types { } default_type text/turtle;
        add_header Content-Disposition inline;
    }

    # ── Direct browsing (dev convenience) ──
    location /respec/ {
        alias /usr/share/nginx/html/respec/;
        autoindex on;
    }
    location /turtle/ {
        alias /usr/share/nginx/html/turtle/;
        autoindex on;
        types { } default_type text/turtle;
    }

    # Root → ontology
    location = / {
        return 302 /koah/def/;
    }

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }
}
