## Fuseki Shiro auth — 로컬 전용. 운영 NAS 이전 시 별도 강화.

[main]
ssl.enabled = false

plainMatcher = org.apache.shiro.authc.credential.SimpleCredentialsMatcher
iniRealm.credentialsMatcher = $plainMatcher

[users]
# 비밀번호는 docker-compose 환경변수에서 주입되지 않음 — 본 ini 는 admin 사용자만 정의
# 실제 비밀번호는 fuseki 컨테이너 시작 시 ADMIN_PASSWORD 로 덮어써짐 (이미지 entrypoint 참조)
admin = REPLACED_AT_RUNTIME, admin

[roles]
admin = *

[urls]
## SPARQL Query 는 익명 허용 (로컬 only — 127.0.0.1 바인딩으로 외부 차단)
/$/ping        = anon
/$/stats/**    = authcBasic, roles[admin]
/$/server      = authcBasic, roles[admin]
/$/datasets/** = authcBasic, roles[admin]
/$/backups/**  = authcBasic, roles[admin]

## 읽기 endpoint: 익명
/knowledgemap/query   = anon
/knowledgemap/sparql  = anon
/knowledgemap/shacl   = anon
/knowledgemap/get     = anon

## 쓰기 endpoint: 인증 필수
/knowledgemap/update  = authcBasic, roles[admin]
/knowledgemap/data    = authcBasic, roles[admin]

/**            = anon
